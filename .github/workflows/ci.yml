name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.2
        with:
          cache: true

      - name: Ruff check
        run: pixi run lint

      - name: Ruff format check
        run: pixi run format-check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.2
        with:
          cache: true

      - name: Run unit tests
        run: pixi run test-unit
