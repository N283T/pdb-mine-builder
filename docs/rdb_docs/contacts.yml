config:
  primaryKey: pdbid
  schema: contacts
tables:
- name: brief_summary
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - modification_date
    - date
    - ''
  - - update_date
    - timestamp without time zone
    - ''
  primary_key:
  - pdbid
  foreign_keys: []
  desc: ''
- name: list
  columns:
  - - pdbid
    - text
    - ''
  - - label_asym_id_1
    - text
    - Chain ID of the first residue/molecule
  - - label_asym_id_2
    - text
    - Chain ID of the second residue/molecule
  - - label_seq_id_1
    - integer
    - Sequence ID of the first residue/molecule
  - - label_seq_id_2
    - integer
    - Sequence ID of the second residue/molecule
  - - label_comp_id_1
    - text
    - Residue/molecule name of the first residue
  - - label_comp_id_2
    - text
    - Residue/molecule name of the second residue
  - - distance
    - real
    - Minimal distance between the two residues/molecules
  primary_key:
  - pdbid
  - label_asym_id_1
  - label_asym_id_2
  - label_seq_id_1
  - label_seq_id_2
  foreign_keys: []
  desc: ''
