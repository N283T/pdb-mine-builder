      the protein production are available it would be expected that this item be
      derived from entity_src_gen_express.host_org_variant or via _entity_src_gen_express.host_org_tax_id
  - - pdbx_host_org_cell_line
    - text
    - A specific line of cells used as the expression system. Where full details of
      the protein production are available it would be expected that this item would
      be derived from entity_src_gen_express.host_org_cell_line
  - - pdbx_host_org_atcc
    - text
    - Americal Tissue Culture Collection of the expression system. Where full details
      of the protein production are available it would be expected that this item
      would be derived from _entity_src_gen_express.host_org_culture_collection
  - - pdbx_host_org_culture_collection
    - text
    - Culture collection of the expression system. Where full details of the protein
      production are available it would be expected that this item would be derived
      somehwere, but exactly where is not clear.
  - - pdbx_host_org_cell
    - text
    - Cell type from which the gene is derived. Where entity.target_id is provided
      this should be derived from details of the target.
  - - pdbx_host_org_scientific_name
    - text
    - The scientific name of the organism that served as host for the production of
      the entity. Where full details of the protein production are available it would
      be expected that this item would be derived from _entity_src_gen_express.host_org_scientific_name
      or via _entity_src_gen_express.host_org_tax_id
  - - pdbx_host_org_tissue
    - text
    - The specific tissue which expressed the molecule. Where full details of the
      protein production are available it would be expected that this item would be
      derived from _entity_src_gen_express.host_org_tissue
  - - pdbx_host_org_vector
    - text
    - Identifies the vector used. Where full details of the protein production are
      available it would be expected that this item would be derived from _entity_src_gen_clone.vector_name.
  - - pdbx_host_org_vector_type
    - text
    - Identifies the type of vector used (plasmid, virus, or cosmid). Where full details
      of the protein production are available it would be expected that this item
      would be derived from _entity_src_gen_express.vector_type.
  - - pdbx_gene_src_ncbi_taxonomy_id
    - text
    - 'NCBI Taxonomy identifier for the gene source organism. Reference: Wheeler DL,
      Chappey C, Lash AE, Leipe DD, Madden TL, Schuler GD, Tatusova TA, Rapp BA (2000).
