      (2000). Database resources of the National Center for Biotechnology Information.
      Nucleic Acids Res 2000 Jan 1;28(1):10-4 Benson DA, Karsch-Mizrachi I, Lipman
      DJ, Ostell J, Rapp BA, Wheeler DL (2000). GenBank. Nucleic Acids Res 2000 Jan
      1;28(1):15-18.'
  - - pdbx_src_id
    - integer
    - This data item is an ordinal identifier for entity_src_gen data records.
  - - pdbx_alt_source_flag
    - text
    - This data item identifies cases in which an alternative source modeled.
  - - pdbx_seq_type
