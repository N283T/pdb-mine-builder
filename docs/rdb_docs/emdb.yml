- name: em_map
  columns:
  - - emdb_id
    - text
    - ''
  - - annotation_details
    - text
    - map annotation details
  - - axis_order_fast
    - text
    - The map axis that corresponds to Columns. (CCP4 HEADER WORD 17 MAPC 1=x, 2=y,
      3=z)
  - - axis_order_medium
    - text
    - The map axis that corresponds to Rows. (CCP4 map header word 18 MAPR 1=x, 2=y,
      3=z)
  - - axis_order_slow
    - text
    - The map axis that corresponds to Sections. (CCP4 map header word 19 MAPS 1=x,
      2=y, 3=z)
  - - cell_a
    - double precision
    - Map unit cell length parameter a. (CCP4 map header word 11)
  - - cell_b
    - double precision
    - Map unit cell length parameter b. (CCP4 map header word 12)
  - - cell_c
    - double precision
    - Map unit cell length parameter c. (CCP4 map header word 13)
  - - cell_alpha
    - double precision
    - Value of map unit cell angle parameter alpha in degrees. (CCP4 map header word
      14)
  - - cell_beta
    - double precision
    - Value of map unit cell angle parameter beta in degrees. (CCP4 map header word
      15)
  - - cell_gamma
    - double precision
    - Value of map unit cell angle parameter gamma in degrees. (CCP4 map header word
      16)
  - - contour_level
    - double precision
    - recommended contour level for viewing the map
  - - contour_level_source
    - text
    - source of the recommended contour level
  - - data_type
    - text
    - 'The map data_type describes the data structure of the map voxels. (CCP4 map
      header word 4 MODE) EMDB currently holds MODE=0,1,and 2 maps; the majority are
      MODE=2. MAPS with MODES other than 2 and 0 may not work in CCP4 programs. MODE
      = 0: 8 bits, density stored as a signed byte (-128 to 127, ISO/IEC 10967) MODE
      = 1: 16 bits, density stored as a signed integer (-32768 to 32767, ISO/IEC 10967)
      MODE = 2: 32 bits, density stored as a floating point number (IEEE 754)'
  - - dimensions_col
    - integer
    - The number of columns in the map. (CCP4 map header word 1 NC)
  - - dimensions_row
    - integer
    - The number of rows in the map. (CCP4 map header word 2 NR)
  - - dimensions_sec
    - integer
    - The number of sections in the map. (CCP4 map header word 3 NS)
  - - endian_type
    - text
    - map file endian type
  - - file
    - text
    - Map file name.
  - - format
    - text
    - map format
  - - id
    - integer
    - PRIMARY KEY
  - - partition
    - integer
    - Identifies the archive file partition number of any map file
  - - entry_id
    - text
    - This data item is a pointer to the ENTRY category.
  - - label
    - text
    - text stored in the label field of the CCP4 map header (WORDS 57-256)
  - - limit_col
    - integer
    - The final column position of the map relative to the Cartesian coordinate origin
      in voxel grid units. (derived = .origin_col + .dimensions_col -1)
  - - limit_row
    - integer
    - The final row position of the map relative to the Cartesian coordinate origin
      in voxel grid units. (derived = .origin_row + .dimensions_row -1)
  - - limit_sec
    - integer
    - The final section position of the map relative to the Cartesian coordinate origin
      in voxel grid units. (derived -- .origin_sec + .dimensions_sec -1)
  - - origin_col
    - integer
    - The position of the first column of the map relative to the Cartesian coordinate
      origin in voxel grid units. (CCP4 map header word 5 NCSTART)
  - - origin_row
    - integer
    - The position of the first row of the map relative to the Cartesian coordinate
      origin in voxel grid units. (CCP4 map header word 6 NRSTART)
  - - origin_sec
    - integer
    - The position of the first section of the map relative to the Cartesian coordinate
      origin in voxel grid units. (CCP4 map header word 7 NSSTART)
  - - pixel_spacing_x
    - double precision
    - The length in angstroms of one voxel along the X axis.
  - - pixel_spacing_y
    - double precision
    - The length in angstroms of one voxel along the Y axis.
  - - pixel_spacing_z
    - double precision
    - The length in angstroms of one voxel along the Z axis.
  - - size_kb
    - bigint
    - map storage size in Kilobytes (before compression)
  - - spacing_x
    - integer
    - The number of intervals per cell repeat in X. (CCP4 map header word 8 NX)
  - - spacing_y
    - integer
    - The number of intervals per cell repeat in Y. (CCP4 map header word 9 NY)
  - - spacing_z
    - integer
    - The number of intervals per cell repeat in Z. (CCP4 map header word 10 NZ)
  - - statistics_average
    - double precision
    - Mean (average) density value of the map.
  - - statistics_maximum
    - double precision
    - Maximum density value of the map.
  - - statistics_minimum
    - double precision
    - Minimum density value of the map.
  - - statistics_std
    - double precision
    - The standard deviation of the map density values.
  - - symmetry_space_group
    - integer
    - The space group number for the map. The value is 1 unless the sample is crystalline.
      (CCP4 map header word 23 ISPG)
  - - type
    - text
    - Map type
  primary_key:
  - emdb_id
  - id
  - entry_id
  foreign_keys: []
  desc: ''
