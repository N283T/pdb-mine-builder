config:
  primaryKey: emdb_id
  schema: emdb
tables:
- name: audit_conform
  columns:
  - - emdb_id
    - text
    - ''
  - - dict_location
    - text
    - A file name or uniform resource locator (URL) for the dictionary to which the
      current data block conforms.
  - - dict_name
    - text
    - The string identifying the highest-level dictionary defining data names used
      in this file.
  - - dict_version
    - text
    - The version number of the dictionary to which the current data block conforms.
  primary_key:
  - emdb_id
  - dict_name
  - dict_version
  foreign_keys: []
  desc: ''
- name: brief_summary
  columns:
  - - emdb_id
    - text
    - ''
  - - docid
    - bigint
    - ''
  - - deposition_date
    - date
    - ''
  - - header_release_date
    - date
    - ''
  - - map_release_date
    - date
    - ''
  - - modification_date
    - date
    - ''
  - - update_date
    - timestamp without time zone
    - ''
  - - content
    - jsonb
    - ''
  - - keywords
    - text[]
    - ''
  primary_key:
  - emdb_id
  foreign_keys: []
  desc: ''
- name: chem_comp
  columns:
  - - emdb_id
    - text
    - ''
  - - formula
    - text
    - 'The formula for the chemical component. Formulae are written according to the
      following rules: (1) Only recognized element symbols may be used. (2) Each element
      symbol is followed by a ''count'' number. A count of ''1'' may be omitted. (3)
      A space or parenthesis must separate each cluster of (element symbol + count),
      but in general parentheses are not used. (4) The order of elements depends on
      whether carbon is present or not. If carbon is present, the order should be:
      C, then H, then the other elements in alphabetical order of their symbol. If
      carbon is not present, the elements are listed purely in alphabetic order of
      their symbol. This is the ''Hill'' system used by Chemical Abstracts.'
  - - formula_weight
    - double precision
    - Formula mass in daltons of the chemical component.
  - - id
    - text
    - The value of _chem_comp.id must uniquely identify each item in the CHEM_COMP
      list. For protein polymer entities, this is the three-letter code for the amino
      acid. For nucleic acid polymer entities, this is the one-letter code for the
      base.
  - - mon_nstd_flag
    - text
    - '''yes'' indicates that this is a ''standard'' monomer, ''no'' indicates that
      it is ''nonstandard''. Nonstandard monomers should be described in more detail
      using the _chem_comp.mon_nstd_parent, _chem_comp.mon_nstd_class and _chem_comp.mon_nstd_details
      data items.'
  - - name
    - text
    - The full name of the component.
  - - type
    - text
    - 'For standard polymer components, the type of the monomer. Note that monomers
      that will form polymers are of three types: linking monomers, monomers with
      some type of N-terminal (or 5'') cap and monomers with some type of C-terminal
      (or 3'') cap.'
  - - pdbx_synonyms
    - text
    - Synonym list for the component.
  primary_key:
  - emdb_id
  - id
  foreign_keys: []
  desc: ''
- name: citation
  columns:
  - - emdb_id
    - text
    - ''
  - - country
    - text
    - The country/region of publication; relevant for books and book chapters.
  - - id
    - text
    - The value of _citation.id must uniquely identify a record in the CITATION list.
      The _citation.id 'primary' should be used to indicate the citation that the
      author(s) consider to be the most pertinent to the contents of the data block.
      Note that this item need not be a number; it can be any unique identifier.
  - - journal_abbrev
    - text
    - Abbreviated name of the cited journal as given in the Chemical Abstracts Service
      Source Index.
  - - journal_id_ASTM
    - text
    - The American Society for Testing and Materials (ASTM) code assigned to the journal
      cited (also referred to as the CODEN designator of the Chemical Abstracts Service);
      relevant for journal articles.
  - - journal_id_CSD
    - text
    - The Cambridge Structural Database (CSD) code assigned to the journal cited;
      relevant for journal articles. This is also the system used at the Protein Data
      Bank (PDB).
  - - journal_id_ISSN
    - text
    - The International Standard Serial Number (ISSN) code assigned to the journal
      cited; relevant for journal articles.
  - - journal_volume
    - text
    - Volume number of the journal cited; relevant for journal articles.
  - - page_first
    - text
    - The first page of the citation; relevant for journal articles, books and book
      chapters.
  - - page_last
    - text
    - The last page of the citation; relevant for journal articles, books and book
      chapters.
  - - title
    - text
    - The title of the citation; relevant for journal articles, books and book chapters.
  - - year
    - integer
    - The year of the citation; relevant for journal articles, books and book chapters.
  - - database_id_CSD
    - text
    - Identifier ('refcode') of the database record in the Cambridge Structural Database
      that contains details of the cited structure.
  - - pdbx_database_id_DOI
    - text
    - Document Object Identifier used by doi.org to uniquely specify bibliographic
      entry.
  - - pdbx_database_id_PubMed
    - integer
    - Ascession number used by PubMed to categorize a specific bibliographic entry.
  - - unpublished_flag
    - text
    - Flag to indicate that this citation will not be published.
  primary_key:
  - emdb_id
  - id
  foreign_keys: []
  desc: ''
- name: citation_author
  columns:
  - - emdb_id
    - text
    - ''
  - - citation_id
    - text
    - This data item is a pointer to _citation.id in the CITATION category.
  - - name
    - text
    - Name of an author of the citation; relevant for journal articles, books and
      book chapters. The family name(s), followed by a comma and including any dynastic
      components, precedes the first name(s) or initial(s).
  - - ordinal
    - integer
    - This data item defines the order of the author's name in the list of authors
      of a citation.
  - - identifier_ORCID
    - text
    - The Open Researcher and Contributor ID (ORCID).
  primary_key:
  - emdb_id
  - citation_id
  - name
  - ordinal
  foreign_keys: []
  desc: ''
- name: database_2
  columns:
  - - emdb_id
    - text
    - ''
  - - database_id
    - text
    - An abbreviation that identifies the database.
  - - database_code
    - text
    - The code assigned by the database identified in _database_2.database_id.
  - - pdbx_database_accession
    - text
    - Extended accession code issued for for _database_2.database_code assigned by
      the database identified in _database_2.database_id.
  - - pdbx_DOI
    - text
    - Document Object Identifier (DOI) for this entry registered with http://crossref.org.
  primary_key:
  - emdb_id
  - database_id
  - database_code
  foreign_keys: []
  desc: ''
- name: em_2d_crystal_entity
