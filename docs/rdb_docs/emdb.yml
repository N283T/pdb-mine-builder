  - - space_group_num
    - integer
    - Space group number.
  primary_key:
  - emdb_id
  - id
  - image_processing_id
  foreign_keys: []
  desc: ''
- name: em_3d_fitting
  columns:
  - - emdb_id
    - text
    - ''
  - - id
    - text
    - The value of _em_3d_fitting.id must uniquely identify a fitting procedure of
      atomic coordinates into 3dem reconstructed map volume.
  - - entry_id
    - text
    - This data item is a pointer to _entry_id in the ENTRY category.
  - - method
    - text
    - The method used to fit atomic coordinates into the 3dem reconstructed map.
  - - target_criteria
    - text
    - The measure used to assess quality of fit of the atomic coordinates in the 3DEM
      map volume.
  - - details
    - text
    - Any additional details regarding fitting of atomic coordinates into the 3DEM
      volume, including data and considerations from other methods used in computation
      of the model.
  - - overall_b_value
    - double precision
    - The overall B (temperature factor) value for the 3d-em volume.
  - - ref_space
    - text
    - A flag to indicate whether fitting was carried out in real or reciprocal refinement
      space.
  - - ref_protocol
    - text
    - The refinement protocol used.
  primary_key:
  - emdb_id
  - id
  - entry_id
  foreign_keys: []
  desc: ''
- name: em_3d_fitting_list
  columns:
  - - emdb_id
    - text
    - ''
  - - id
    - text
    - PRIMARY KEY
  - - 3d_fitting_id
    - text
    - The value of _em_3d_fitting_list.3d_fitting_id is a pointer to _em_3d_fitting.id
      in the 3d_fitting category
  - - pdb_entry_id
    - text
    - The PDB code for the entry used in fitting.
  - - pdb_chain_id
    - text
    - The ID of the biopolymer chain used for fitting, e.g., A. Please note that only
      one chain can be specified per instance. If all chains of a particular structure
      have been used for fitting, this field can be left blank.
  - - pdb_chain_residue_range
    - text
    - Residue range for the identified chain.
  - - details
    - text
    - Details about the model used in fitting.
  - - chain_id
    - text
    - The ID of the biopolymer chain used for fitting, e.g., A. Please note that only
      one chain can be specified per instance. If all chains of a particular structure
      have been used for fitting, this field can be left blank.
  - - chain_residue_range
    - text
    - The residue ranges of the initial model used in this fitting.
  - - source_name
    - text
    - This item identifies the resource of initial model used for refinement
  - - type
    - text
    - This item describes the type of the initial model was generated
  - - accession_code
    - text
    - This item identifies an accession code of the resource where the initial model
      is used
  - - initial_refinement_model_id
    - integer
    - The value of _em_3d_fitting.initial_refinement_model_id itentifies the id in
      the _pdbx_initial_refinement_model
  primary_key:
  - emdb_id
  - id
  - 3d_fitting_id
  foreign_keys: []
  desc: ''
- name: em_3d_reconstruction
  columns:
  - - emdb_id
    - text
    - ''
  - - entry_id
    - text
    - This data item is a pointer to _entry.id in the ENTRY category.
  - - id
    - text
    - PRIMARY KEY
  - - method
    - text
    - The algorithm method used for the 3d-reconstruction.
  - - algorithm
    - text
    - The reconstruction algorithm/technique used to generate the map.
  - - details
    - text
    - Any additional details used in the 3d reconstruction.
  - - resolution
    - double precision
    - The final resolution (in angstroms) of the 3D reconstruction.
  - - resolution_method
    - text
    - The method used to determine the final resolution of the 3d reconstruction.
      The Fourier Shell Correlation criterion as a measure of resolution is based
      on the concept of splitting the (2D) data set into two halves; averaging each
      and comparing them using the Fourier Ring Correlation (FRC) technique.
  - - nominal_pixel_size
    - double precision
    - The nominal pixel size of the projection set of images in Angstroms.
  - - actual_pixel_size
    - double precision
    - The actual pixel size of the projection set of images in Angstroms.
  - - num_particles
    - integer
    - The number of 2D projections or 3D subtomograms used in the 3d reconstruction
  - - num_class_averages
    - integer
    - The number of classes used in the final 3d reconstruction
  - - fsc_type
    - text
    - Half-set refinement protocol (semi-independent or gold standard)
  - - refinement_type
    - text
    - Indicates details on how the half-map used for resolution determination (usually
      by FSC) have been generated.
  - - image_processing_id
    - text
    - Foreign key to the EM_IMAGE_PROCESSING category
  - - symmetry_type
    - text
    - The type of symmetry applied to the reconstruction
  primary_key:
  - emdb_id
  - id
  - image_processing_id
  foreign_keys: []
  desc: ''
- name: em_admin
