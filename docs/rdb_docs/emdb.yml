    - PRIMARY KEY
  - - entity_assembly_id
    - text
    - Corresponding key in _em_entity_assembly category.
  - - length_a
    - double precision
    - Unit-cell length a in angstroms.
  - - length_b
    - double precision
    - Unit-cell length b in angstroms.
  - - length_c
    - double precision
    - Thickness of 2D crystal
  - - space_group_name_H-M
    - text
    - ''
  primary_key:
  - emdb_id
  - id
  - image_processing_id
  foreign_keys: []
  desc: ''
- name: em_3d_crystal_entity
  columns:
  - - emdb_id
    - text
    - ''
  - - angle_alpha
    - double precision
    - Unit-cell angle alpha in degrees.
  - - angle_beta
    - double precision
    - Unit-cell angle beta in degrees.
  - - angle_gamma
    - double precision
    - Unit-cell angle gamma in degrees.
  - - image_processing_id
    - text
    - pointer to _em_image_processing.id in the EM_IMAGE_PROCESSING category.
  - - id
    - text
    - PRIMARY KEY
  - - length_a
    - double precision
    - Unit-cell length a in angstroms.
  - - length_b
    - double precision
    - Unit-cell length b in angstroms.
  - - length_c
    - double precision
    - Unit-cell length c in angstroms.
  - - space_group_name
