    - text
    - The method by which the sample for the entity was produced. Entities isolated
      directly from natural sources (tissues, soil samples etc.) are expected to have
      further information in the ENTITY_SRC_NAT category. Entities isolated from genetically
      manipulated sources are expected to have further information in the ENTITY_SRC_GEN
      category.
  - - type
    - text
    - Defines the type of the entity. Polymer entities are expected to have corresponding
      ENTITY_POLY and associated entries. Non-polymer entities are expected to have
      corresponding CHEM_COMP and associated entries. Water entities are not expected
      to have corresponding entries in the ENTITY category.
  - - pdbx_description
    - text
    - A description of the entity. Corresponds to the compound name in the PDB format.
  - - pdbx_number_of_molecules
