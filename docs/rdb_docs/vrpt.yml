- name: pdbx_vrpt_summary_entity_geometry
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - ordinal
    - integer
    - Uniquely identifies each instance of this summary.
  - - PDB_model_num
    - integer
    - The unique model number from _atom_site.pdbx_PDB_model_num.
  - - entity_id
    - text
    - The entity id for the residue or chain.
  - - label_asym_id
    - text
    - The _atom_site.label_asym_id label for the residue. Normally this is the same
      as the chain.
  - - auth_asym_id
    - text
    - The _atom_site.auth_asym_id identifier for the instance.
  - - angles_RMSZ
    - double precision
    - The overall root mean square of the Z-score for deviations of bond angles in
      comparison to "standard geometry" made using the MolProbity dangle program.
      Standard geometry parameters are taken from Engh and Huber (2001) and Parkinson
      et al. (1996).
  - - bonds_RMSZ
    - double precision
    - The overall root mean square of the Z-score for deviations of bond lengths in
      comparison to "standard geometry" made using the MolProbity dangle program.
      Standard geometry parameters are taken from Engh and Huber (2001) and Parkinson
      et al. (1996).
  - - num_bonds_RMSZ
    - integer
    - The number of bond lengths compared to "standard geometry" made using the MolProbity
      dangle program. Standard geometry parameters are taken from Engh and Huber (2001)
      and Parkinson et al. (1996).
  - - num_angles_RMSZ
    - integer
    - The number of bond angles compared to "standard geometry" made using the MolProbity
      dangle program. Standard geometry parameters are taken from Engh and Huber (2001)
      and Parkinson et al. (1996).
  - - average_residue_inclusion
    - double precision
    - The average of the residue inclusions for all residues in this instance
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_summary_geometry
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - percent_ramachandran_outliers
    - double precision
    - The percentage of residues with Ramachandran outliers.
  - - clashscore
    - double precision
    - This score is derived from the number of pairs of atoms in the PDB_model_num
      that are unusually close to each other. It is calculated by the MolProbity pdbx_vrpt_software
      and expressed as the number or such clashes per thousand atoms. For structures
      determined by NMR the clashscore value here will only consider label_atom_id
      pairs in the well-defined (core) residues from ensemble analysis.
  - - angles_RMSZ
    - double precision
    - The overall root mean square of the Z-score for deviations of bond angles in
      comparison to "standard geometry" made using the MolProbity dangle program.
      Standard geometry parameters are taken from Engh and Huber (2001) and Parkinson
      et al. (1996). This value is for all chains in the structure.
  - - bonds_RMSZ
    - double precision
    - The overall root mean square of the Z-score for deviations of bond lengths in
      comparison to "standard geometry" made using the MolProbity dangle program.
      Standard geometry parameters are taken from Engh and Huber (2001) and Parkinson
      et al. (1996). This value is for all chains in the structure.
  - - num_angles_RMSZ
    - integer
    - The number of bond angles compared to "standard geometry" made using the MolProbity
      dangle program. Standard geometry parameters are taken from Engh and Huber (2001)
      and Parkinson et al. (1996). This value is for all chains in the structure.
  - - num_bonds_RMSZ
    - integer
    - The number of bond lengths compared to "standard geometry" made using the MolProbity
      dangle program. Standard geometry parameters are taken from Engh and Huber (2001)
      and Parkinson et al. (1996). This value is for all chains in the structure.
  - - percent_rotamer_outliers
    - double precision
    - 'The MolProbity sidechain outlier score (a percentage). Protein sidechains mostly
      adopt certain (combinations of) preferred torsion angle values (called rotamers
      or rotameric conformers), much like their backbone torsion angles (as assessed
      in the Ramachandran analysis). MolProbity considers the sidechain conformation
      of a residue to be an outlier if its set of torsion angles is not similar to
      any preferred combination. The sidechain outlier score is calculated as the
      percentage of residues with an unusual sidechain conformation with respect to
      the total number of residues for which the assessment is available. Example:
      percent-rota-outliers="2.44". Specific to structure that contain protein chains
      and have sidechains modelled. For NMR structures only the well-defined (core)
      residues from ensemble analysis will be considered. The percentage of residues
      with rotamer outliers.'
  - - percent_ramachandran_outliers_full_length
    - double precision
    - Only given for structures determined by NMR. The MolProbity Ramachandran outlier
      score for all atoms in the structure rather than just the well-defined (core)
      residues.
  - - percent_rotamer_outliers_full_length
    - double precision
    - Only given for structures determined by NMR. The MolProbity sidechain outlier
      score for all atoms in the structure rather than just the well-defined (core)
      residues.
  - - clashscore_full_length
    - double precision
    - Only given for structures determined by NMR. The MolProbity pdbx_vrpt_instance_clashes
      score for all label_atom_id pairs.
  - - num_H_reduce
    - integer
    - This is the number of hydrogen atoms added and optimized by the MolProbity reduce
      pdbx_vrpt_software as part of the all-atom clashscore.
  - - ordinal
    - integer
    - Uniquely identifies each instance of this category.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_summary_nmr
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - exp_method
    - text
    - Experimental method for statistics
  - - nmr_models_consistency_flag
    - text
    - A flag indicating if all models in the NMR ensemble contain the exact same atoms
      ("True") or if the models differ in this respect ("False").
  - - nmrclust_representative_model
    - integer
    - Overall representative PDB_model_num of the NMR ensemble as identified by NMRClust.
  - - medoid_model
    - integer
    - For each Cyrange well-defined core ("cyrange_domain") the id of the PDB_model_num
      which is most similar to other models as measured by pairwise RMSDs over the
      domain. For the whole entry ("Entry"), the medoid PDB_model_num of the largest
      core is taken as an overall representative of the structure.
  - - nmrclust_number_of_outliers
    - integer
    - Number of models that do not belong to any cluster as deemed by NMRClust.
  - - nmrclust_number_of_models
    - integer
    - Number of models analysed by NMRClust - should in almost all cases be the same
      as the number of models in the NMR ensemble.
  - - nmrclust_number_of_clusters
    - integer
    - Total number of clusters in the NMR ensemble identified by NMRClust.
  - - cyrange_number_of_domains
    - integer
    - Total number of well-defined cores (domains) identified by Cyrange
  - - chemical_shift_completeness
    - double precision
    - Overall completeness of the chemical shift assignments for the well-defined
      regions of the structure.
  - - chemical_shift_completeness_full_length
    - double precision
    - Overall completeness of the chemical shift assignments for the full macromolecule
      or complex as suggested by the molecular description of an entry (whether some
      portion of it is modelled or not).
  - - cyrange_error
    - text
    - Diagnostic message from the wrapper of Cyrange software which identifies the
      well-defined cores (domains) of NMR protein structures.
  - - ordinal
    - integer
    - Uniquely identifies each instance of this category.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
