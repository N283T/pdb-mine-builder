    - The number of reflections in the free set as defined in the input structure
      factor file supplied to the validation pipeline. X-ray entry specific, obtained
      from the DCC program.
  - - percent_free_reflections
    - double precision
    - A percentage, Normally percent proportion of the total number. Between 0% and
      100%.
  - - percent_RSRZ_outliers
    - double precision
    - The percent of RSRZ outliers.
  - - PDB_resolution_high
    - double precision
    - The high resolution limit of the data.
  - - PDB_resolution_low
    - double precision
    - The low resolution limit of the diffraction data.
  - - PDB_R
    - double precision
    - The reported R in the model file.
  - - PDB_Rfree
