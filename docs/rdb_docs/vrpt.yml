  - - violations_count
    - integer
    - Number of violated restraints
  - - ensemble_dihedral_count
    - text
    - Indicates the count of the ensemble
  - - ordinal
    - integer
    - Uniquely identifies each instance of this category.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_dihedralangle_violation_ensemble_summary
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - fraction_of_ensemble_count
    - integer
    - Number of violated models for given set of violated restraints
  - - fraction_of_ensemble_percent
    - double precision
    - Percentage of violated models for given set of violated restraints
  - - id
    - text
    - Uniquely identifies each instance of this category.
  primary_key:
  - pdbid
  - id
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_dihedralangle_violation_model
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - ang_rest_type
    - text
    - The type of dihedral-angle restraint
  - - violations_count
    - integer
    - Number of violated restraints.
  - - PDB_model_num
    - integer
    - Model number.
  - - ordinal
    - integer
    - Uniquely identifies each instance of this category.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_dihedralangle_violation_model_summary
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - PDB_model_num
    - integer
    - Model number in summary.
  - - max_violation
    - double precision
    - The maximum value of violation of a particular restraint in an ensemble
  - - mean_violation
    - double precision
    - The mean value of the violation of a given restraint in an ensemble.
  - - standard_deviation
    - double precision
    - The standard deviation of the value of the violations of a given restraint in
      an ensemble.
  - - median_violation
    - double precision
    - The median value of the violation of a given restraint in an ensemble
  - - ordinal
    - integer
    - Uniquely identifies each instance of this category.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_dihedralangle_violations_summary
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - restraint_type
    - text
    - The dihedral-angle restraint type (PHI,PSI,etc)
  - - consistently_violated_count
    - integer
    - Number of restraints that are violated in all models
  - - consistently_violated_percent_total
    - double precision
    - Percentage of restraints that are violated in all models against total number
      of restraints.
  - - consistently_violated_percent_type
    - double precision
    - Percentage of restraints that are violated in all models against number of restraints
      in a given restraint type.
  - - restraints_count
    - integer
    - Number of restraints in a given restraint type.
  - - violated_count
    - integer
    - Number of restraints that are violated that are violated at least in one model.
  - - percent_total
    - double precision
    - Percentage of restraints in a given restraint type.
  - - violated_percent_total
    - double precision
    - Percentage of restraints that are violated at least in one model in given restraint
      type against the total restraints
  - - violated_percent_type
    - double precision
    - Percentage of restraints that are violated at least in one model against the
      total number of restraints in a given restraints type
  - - ordinal
    - integer
    - Uniquely identifies each instance of this category.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_distance_violation_ensemble
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - dist_rest_type
    - text
    - The type of distance restraint (intraresidue, sequential, etc.)
  - - violations_count
    - integer
    - Number of violated restraints in ensemble.
  - - ensemble_distance_count
    - text
    - Number of violated models for given set of violated restraint
  - - ordinal
    - integer
    - Uniquely identifies each instance of this category.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_distance_violation_model_restraints
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - dist_rest_type
    - text
