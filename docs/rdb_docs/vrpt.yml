- name: pdbx_vrpt_instance_symm_clashes
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - ordinal
    - integer
    - Uniquely identifies each symmetry clash.
  - - label_atom_id
    - text
    - An label_atom_id name from cif item _atom_site.label_atom_id and _chem_comp_atom.atom_id.
  - - symop
    - text
    - The symmetry operator for the label_atom_id in the contact. The 1_555 notation
      is crystallographic shorthand to describe a particular symmetry operator (the
      number before the underscore) and any required translation (the three numbers
      following the underscore). Symmetry operators are defined by the space group
      and the translations are given for the three-unit cell axis (a, b, and c) where
      5 indicates no translation and numbers higher or lower signify the number of
      unit cell translations in the positive or negative direction. For example, 4_565
      indicates the use of symmetry operator 4 followed by a one-unit cell translation
      in the positive b direction. One of the atoms in the contact will have symop="1_555"
      that indicates the identity operator.
  - - scid
    - integer
    - An identifier that cross references the other label_atom_id in the clash. The
      two atoms in the clash will have the same unique scid.
  - - clashmag
    - double precision
    - The "magnitude" of the pdbx_vrpt_instance_clashes in Angstroms assessed by the
      validation package. In this case, the "magnitude" of a pdbx_vrpt_instance_clashes
      is defined as 2.2 Angstrom (or 1.6 Angstrom if either label_atom_id is a hydrogen
      atom) minus the interatomic distance.
  - - dist
    - double precision
    - The distance in Angstroms between two atoms involved a clash.
  - - instance_id
    - text
    - A pointer to pdbx_vrpt_model_instance.id.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_model_instance
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - id
    - text
    - Uniquely identifies each instance of the model.
  - - auth_asym_id
    - text
    - The auth_asym_id identifier for the residue is the same as in the model mmCIF
      item _atom_site.auth_asym_id.
  - - auth_seq_id
    - integer
    - The authors residue number for a residue. This is obtained from _atom_site.auth_seq_id
  - - label_comp_id
    - text
    - The "residue type", this is the name of the chemical component from the PDB
      chemical component dictionary. This is the same and the model mmCIF _atom_site.auth_comp_id.
  - - PDB_model_num
    - integer
    - The number corresponding to _atom_site.pdbx_PDB_model_num. If the structure
      does not have multiple models then PDB_model_num will be "1".
  - - label_alt_id
    - text
    - This attribute will be set if the pdbx_vrpt_model_instance has atoms with the
      alternate position indicator set. Normally one character but can be up to 3.
      Example label_alt_id="A" Obtained from _atom_site.label_alt_id
  - - PDB_ins_code
    - text
    - Insertion code for residue from _atom_site.pdbx_PDB_ins_code
  - - entity_id
    - text
    - The entity id for the residue or chain. This is a pointer to _pdbx_vrpt_entity.id
  - - label_asym_id
    - text
    - The _atom_site.label_asym_id label for the residue. Normally this is the same
      as the author chain name.
  - - label_seq_id
    - integer
    - From the modell mmCIF item _atom_site.label_seq_id. This is an internal sequence
      number within a polymer chain or "." for non-polymeric residue.
  - - count_angle_outliers
    - integer
    - Count of number of atoms with angle outliers for this instance
  - - count_bond_outliers
    - integer
    - Count of number of atoms with bond outliers in this instance
  - - count_symm_clashes
    - integer
    - Count of number of symmetry related clashes for this instance.
  - - count_chiral_outliers
    - integer
    - Count of number of chiral outliers for instance.
  - - count_plane_outliers
    - integer
    - Count of number of planar outliers for this instance.
  - - count_mogul_angle_outliers
    - integer
    - Count of number of angle outliers as reported by MOGUL for this instance.
  - - count_mogul_bond_outliers
    - integer
    - Count of number of bond outliers as reported by MOGUL for this residue.
  - - count_mogul_torsion_outliers
    - integer
    - Count of number torsion angle outliers as reported by MOGUL for this instance.
  - - count_mogul_ring_outliers
    - integer
    - Count of number of atoms with ring outliers as reported by MOGUL for this instance.
  - - count_clashes
    - integer
    - Count of number of atoms a with a pdbx_vrpt_instance_clashes for this instance.
  - - ligand_of_interest
    - text
    - A flag to indicate if this instance is a ligand of interest.
  primary_key:
  - pdbid
  - id
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_model_instance_density
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - natoms_eds
    - integer
    - The number of atoms in the residue returned by the EDS software.
  - - RSRCC
    - double precision
    - The real space correlation coefficient for the instance. This is an alternative
      to RSR for assessing how well the residue's calculated electron density map
      matches the EDS electron density map calculated from the experimental diffraction
      data. A value above 0.95 normally indicates a very good fit. RSCC around 0.90
      are generally OK. A poor fit results in a value around or below 0.80. X-ray
      specific produced by the EDS step.
  - - RSR
    - double precision
    - Real Space R-value (RSR) for the residue from the EDS generated map. X-ray specific
      produced by the EDS step.
  - - RSRZ
    - double precision
    - RSR Z-score (RSRZ) is a normalisation of RSR specific to a residue type and
      a resolution bin. RSRZ is calculated only for standard amino acids and nucleotides
      in protein, DNA and RNA chains. A residue is considered an RSRZ outlier if its
      RSRZ value is greater than 2. X-ray specific produced by the EDS step.
  - - instance_id
    - text
    - A pointer to pdbx_vrpt_model_instance.id.
  - - ordinal
    - integer
    - Uniquely identifies each instance of this category.
  - - EDIAm
    - double precision
    - The EDIAm score aggregates the electron density support for individual atoms
      (EDIA score) within a residue, evaluating the overall electron density fit for
      the residue. A residue with an EDIAm below 0.8 suggests that its constituent
      atoms display increasing inconsistency with the electron density, and should
      be visually inspected.
  - - OPIA
    - double precision
    - Overall Percentage of well-resolved Interconnected Atoms score indicates the
      percentage of atoms within a residue where the EDIA score exceeds 0.8. A value
      below 50% suggests less than half of the atoms in the residue lack good electron
      density support and should be visually inspected.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_model_instance_geometry
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - OWAB
    - double precision
    - The Occupancy-Weighted Average B (OWAB) value per residue (in units Angstroms
      squared). This value is calculated by multiplying the B factor for each label_atom_id
      in the residue by its occupancy and then averaging this value over all atoms
      in the residue. X-ray specific produced by the EDS step.
  - - residue_inclusion
    - double precision
    - The proportion of all atoms of the residue in density
  - - num_H_reduce
    - integer
    - This is the number of hydrogen atoms added and optimized by the MolProbity reduce
      software as part of the all-atom clashscore.
  - - num_bonds_RMSZ
    - integer
    - The number of bond lengths compared to "standard geometry" made using the MolProbity
      dangle program. Standard geometry parameters are taken from Engh and Huber (2001)
      and Parkinson et al. (1996).
  - - bonds_RMSZ
    - double precision
    - The overall root mean square of the Z-score for deviations of bond lengths in
      comparison to "standard geometry" made using the MolProbity dangle program.
      Standard geometry parameters are taken from Engh and Huber (2001) and Parkinson
      et al. (1996).
  - - num_angles_RMSZ
    - integer
    - The number of bond angles compared to "standard geometry" made using the MolProbity
      dangle program. Standard geometry parameters are taken from Engh and Huber (2001)
      and Parkinson et al. (1996).
  - - angles_RMSZ
    - double precision
    - The overall root mean square of the Z-score for deviations of bond angles in
      comparison to "standard geometry" made using the MolProbity dangle program.
      Standard geometry parameters are taken from Engh and Huber (2001) and Parkinson
      et al. (1996).
  - - program_for_bond_angle_geometry
    - text
    - The software used to calculate the bond and angle RMSZ statistics.
  - - average_occupancy
    - double precision
    - The average occupancy for the residue. Hydrogen atoms are excluded from consideration.
      X-ray specific produce by the EDS step.
  - - ligand_chirality_outlier
    - text
    - A flag indicating of a ligand has a chirality outlier.
  - - validate
    - text
    - A flag for NMR entries to indicate if a residue should be included in calculating
      the overall entry scores ("True") or if it should be excluded from such calculations
      ("False").
  - - cyrange_domain_id
    - integer
    - Identifier of the well-defined core (domain) to which the residue belongs, as
      determined by Cyrange.
  - - cis_peptide
    - text
    - A flag to indicate that the residue is a cis-peptide.
  - - RNA_score
    - double precision
    - MolProbity RNA match quality parameter "suiteness". The suiteness is a measure
      of how well the detailed local backbone conformation fits one of the most commonly
      observed (and thus presumably most favorable) conformational clusters. Varies
      between 1.0 meaning a good match to a commonly observed cluster to 0.0 meaning
      an outlier.
  - - RNA_suite
    - text
    - MolProbity RNA_suite conformation analysis. RNA specific produced by the molprobity
      step.
  - - RNA_pucker
    - text
    - Placeholder for reporting RNA pucker problem from MolProbity.
  - - flippable_sidechain
    - text
    - MolProbity identifies side chains of asparagine, glutamine and histidine that
      can be be rotated ("flipped") to make optimal hydrogen bonds, improving its
      contacts with its neighbours, without affecting their fit to the experimental
      electron density. These residues will have flippable_sidechain="1". Protein
      and polypeptide specific produced by the molprobity step.
  - - ramachandran_class
    - text
    - 'MolProbity Ramachandran plot classification for this residue one of "Favored",
      "Allowed" or "OUTLIER". Example: ramachandran_class="Favored" Protein and polypeptide
      specific produced by the molprobity step.'
  - - rotamer_class
    - text
    - 'For proteins the MolProbity classification of the side conformation from the
