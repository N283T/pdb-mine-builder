config:
  primaryKey: pdbid
  schema: vrpt
tables:
- name: audit_conform
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - dict_location
    - text
    - A file name or uniform resource locator (URL) for the dictionary to which the
      current data block conforms.
  - - dict_name
    - text
    - The string identifying the highest-level dictionary defining data names used
      in this file.
  - - dict_version
    - text
    - The version number of the dictionary to which the current data block conforms.
  primary_key:
  - pdbid
  - dict_name
  - dict_version
  foreign_keys: []
  desc: ''
- name: brief_summary
  columns:
  - - pdbid
    - text
    - ''
  - - docid
    - bigint
    - ''
  - - update_date
    - timestamp without time zone
    - Entry update date (within the RDB).
  - - keywords
    - text[]
    - Array of keywords.
  primary_key:
  - pdbid
  foreign_keys: []
  desc: ''
- name: entity
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - id
    - text
    - The value of _entity.id must uniquely identify a record in the ENTITY list.
      Note that this item need not be a number; it can be any unique identifier.
  - - type
    - text
    - Defines the type of the entity. Polymer entities are expected to have corresponding
      ENTITY_POLY and associated entries. Non-polymer entities are expected to have
      corresponding CHEM_COMP and associated entries. Water entities are not expected
      to have corresponding entries in the ENTITY category.
  - - src_method
    - text
    - The method by which the sample for the entity was produced. Entities isolated
      directly from natural sources (tissues, soil samples etc.) are expected to have
      further information in the ENTITY_SRC_NAT category. Entities isolated from genetically
      manipulated sources are expected to have further information in the ENTITY_SRC_GEN
      category.
  - - pdbx_description
    - text
    - A description of the entity. Corresponds to the compound name in the PDB format.
  - - formula_weight
    - double precision
    - Formula mass in daltons of the entity.
  - - pdbx_number_of_molecules
    - integer
    - A place holder for the number of molecules of the entity in the entry.
  - - pdbx_ec
    - text
    - Enzyme Commission (EC) number(s)
  - - pdbx_mutation
    - text
    - Details about any entity mutation(s).
  - - pdbx_fragment
    - text
    - Entity fragment description(s).
  - - details
    - text
    - A description of special aspects of the entity.
  primary_key:
  - pdbid
  - id
  foreign_keys: []
  desc: ''
- name: entry
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - id
    - text
    - The value of _entry.id identifies the data block. Note that this item need not
      be a number; it can be any unique identifier.
  primary_key:
  - pdbid
  - id
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_assign_completeness_full_length
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - ordinal
    - integer
    - Uniquely identifies each instance of this category.
  - - number_of_assigned_shifts
    - integer
    - Number of typically assigned nuclei of a given "type" (e.g., backbone) and "element"
      (13C) in the structure that have a chemical shift assignment.
  - - number_of_unassigned_shifts
    - integer
    - Number of typically assigned nuclei of a given "type" (e.g., backbone) and "element"
      (13C) in the structure that lack a chemical shift assignment
  - - number_of_shifts
    - integer
    - Total number of typically assigned nuclei of a given "type" (e.g., backbone)
      and "element" (13C) in the structure irrespective of assignment. It should be
      a sum of "number_of_unassigned_shifts" and "number_of_assigned_shifts" for the
      same type and element.
  - - type
    - text
    - '"Type" refers to a subset of assignments: overall, backbone, aliphatic sidechain,
      aromatic protein rings, nucleic acid base and ribose or deoxyribose ring.'
  - - element
    - text
    - The chemical element (isotope) for which the assignment completeness is calculated.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_assign_completeness_well_defined
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - ordinal
    - integer
    - Uniquely identifies each well defined region.
  - - number_of_assigned_shifts
    - integer
    - Number of typically assigned nuclei of a given "type" (e.g., backbone) and "element"
      (13C) in the structure that have a chemical shift assignment.
  - - number_of_unassigned_shifts
    - integer
    - Number of typically assigned nuclei of a given "type" (e.g., backbone) and "element"
      (13C) in the structure that lack a chemical shift assignment
  - - number_of_shifts
    - integer
    - Total number of typically assigned nuclei of a given "type" (e.g., backbone)
      and "element" (13C)in the structure irrespective of assignment. It should be
      a sum of "number_of_unassigned_shifts" and "number_of_assigned_shifts" for the
      same type and element.
  - - type
    - text
    - '"Type" refers to a subset of assignments: overall, backbone, aliphatic sidechain,
      aromatic protein rings, nucleic acid base and ribose or deoxyribose ring.'
  - - element
    - text
    - The chemical element (isotope) for which the assignment completeness is calculated.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_asym
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - label_asym_id
    - text
    - The _struct_asym.label_asym_id in the PDB_model_num
  - - entity_id
    - text
    - The entity id corresponding to the label_asym_id.
  primary_key:
  - pdbid
  - label_asym_id
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_chemical_shift_list
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - ordinal
    - integer
    - Uniquely identifies each chemical shift.
  - - file_id
    - integer
    - An identifier of a chemical shifts file.
  - - file_name
    - text
    - The name of the chemical shifts file supplied to the validation pipeline.
  - - block_name
    - text
    - Label of the section that contains chemical shifts.
  - - list_id
    - text
    - Identifier of the chemical shift list in the file.
  - - type
    - text
    - A flag indicating if the chemical shift list contains all the required data
      items i.e., NMR-STAR 3.1 tags ("full") or if any data items are missing ("partial").
  - - number_of_errors_while_mapping
    - integer
    - Number of chemical shifts that could not be mapped to structure.
  - - number_of_warnings_while_mapping
    - integer
    - Currently not used. Reserved for ambiguous mappings.
  - - number_of_mapped_shifts
    - integer
    - Number of chemical shifts successfully mapped to the structure.
  - - number_of_parsed_shifts
    - integer
    - Number of chemical shifts successfully parsed.
  - - total_number_of_shifts
    - integer
    - Total number of records in the chemical shift list.
  - - number_of_unparsed_shifts
    - integer
    - Number of chemical shifts that could not be parsed.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_chemical_shift_outlier
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - ordinal
    - integer
    - Uniquely identifies each outlier.
  - - auth_asym_id
    - text
    - 'The auth_asym_id identifier for the residue or auth_asym_id obtained from cif
      item _atom_site.auth_asym_id. Currently this is limited to 5 characters. Example:
      auth_asym_id="A"'
  - - rescode
    - text
    - The "residue type", this is the name of the chemical component from the PDB
      chemical component dictionary. Obtained from _atom_site.auth_comp_id
  - - auth_seq_id
    - integer
    - The residue number aka sequence id for a residue. Obtained from _atom_site.auth_seq_id
  - - label_atom_id
    - text
    - An label_atom_id name from cif item _atom_site.label_atom_id and _chem_comp_atom.atom_id.
  - - value
    - double precision
    - Value in ppm of a chemical shift
  - - zscore
    - double precision
    - The Zscore of the deviation of the bond length or bond angle in the model compared
      to Mogul expected values and standard deviation. A Z score is generally defined
      as the difference between an observed value an expected or average value, divided
      by the standard deviations of the latter. Units depend on the parameter being
      analyzed.
  - - prediction
    - text
    - The mean value of the chemical shift expected from the BMRB statistics.
  - - method
    - text
    - Method to determine the expected value and standard deviation. At present this
      is limited to BMRB statistics.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_cyrange_domain
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - ordinal
    - integer
    - Uniquely identifies each domain.
  - - domain
    - integer
    - Identifier of the well-defined core
  - - number_of_gaps
    - integer
    - Number of omissions from the contiguous protein _atom_site.auth_asym_id within
      the individual well-defined core (domain).
  - - number_of_residues
    - integer
    - Number of residues composing the individual well-defined core (domain).
  - - percentage_of_core
    - double precision
    - What fraction the individual core contributes to the total well-defined portion
      of the protein.
  - - rmsd
    - double precision
    - Average pairwise backbone RMSD of the individual well-defined core (domain)
      over the ensemble.
  - - medoid_model
    - integer
    - For each Cyrange well-defined core ("cyrange_domain") the id of the model which
      is most similar to other models as measured by pairwise RMSDs over the domain.
      For the whole entry, the medoid model of the largest core is taken as an overall
      representative of the structure.
  - - medoid_rmsd
    - double precision
    - Average RMSD between the medoid model and other members of the ensemble.
  - - residue_string
    - text
    - Simplified description of the residue composition of the individual well-defined
      core (domain).
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_database
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - code
    - text
    - Accession code
  - - id
    - text
    - Uniquely identifies each instance of this category.
  - - extended_code
    - text
    - Extended accession code
  primary_key:
  - pdbid
  - id
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_dihedralangle_ensemble_violation
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
