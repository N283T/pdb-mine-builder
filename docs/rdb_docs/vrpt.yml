- name: pdbx_vrpt_summary_diffraction
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
      table.
  - - exp_method
    - text
    - Experimental method for statistics
  - - Babinet_b
    - double precision
    - 'REFMAC scaling parameter as reported in log output line starting ''bulk solvent:
      scale''. X-ray entry specific, obtained in the EDS step from REFMAC calculation.'
  - - bulk_solvent_b
    - double precision
    - REFMAC scaling parameter as reported in log output file. X-ray entry specific,
      obtained in the EDS step from REFMAC calculation.
  - - Wilson_B_estimate
    - double precision
    - An estimate of the overall B-value of the structure, calculated from the diffraction
      data. Units Angstroms squared. It serves as an indicator of the degree of order
      in the crystal and the value is usually not hugely different from the average
      B-value calculated from the model. X-ray entry specific, calculated by Phenix
      Xtriage program.
  - - I_over_sigma
    - text
    - Each reflection has an intensity (I) and an uncertainty in measurement (sigma(I)),
      so I/sigma(I) is the signal-to-noise ratio. This ratio decreases at higher resolution.
      <I/sigma(I)> is the mean of individual I/sigma(I) values. Value for outer resolution
      shell is given in parentheses. In case structure factor amplitudes are deposited,
      Xtriage estimates the intensities first and then calculates this metric. When
      intensities are available in the deposited file, these are converted to amplitudes
      and then back to intensity estimate before calculating the metric. X-ray entry
      specific, calculated by Phenix Xtriage program.
  - - num_miller_indices
    - integer
    - The number of Miller Indices reported by the Xtriage program. This should be
      the same as the number of _refln in the input structure factor file. X-ray entry
      specific, calculated by Phenix Xtriage program.
  - - Babinet_k
    - double precision
    - 'REFMAC scaling parameter as reported in log output line starting ''bulk solvent:
      scale''. X-ray entry specific, obtained in the EDS step from REFMAC calculation.'
  - - bulk_solvent_k
    - double precision
    - REFMAC reported scaling parameter. X-ray entry specific, obtained in the EDS
      step from REFMAC calculation.
  - - Padilla_Yeates_L_mean
    - double precision
    - Padilla and Yeates twinning parameter <|L|>. Theoretical values is 0.5 in the
      untwinned case, and 0.375 in the perfectly twinned case. X-ray entry specific,
      obtained from the Xtriage program.
  - - Padilla_Yeates_L2_mean
    - double precision
    - Padilla and Yeates twinning parameter <|L**2|>. Theoretical values is 0.333
      in the untwinned case, and 0.2 in the perfectly twinned case. X-ray entry specific,
      obtained from the Xtriage program.
  - - DCC_R
    - double precision
    - The overall R-factor from a DCC recalculation of an electron density map. Currently
      value is rounded to 2 decimal places. X-ray entry specific, obtained from the
      DCC program.
  - - DCC_Rfree
    - double precision
    - Rfree as calculated by DCC.
  - - EDS_R
    - double precision
    - The overall R factor from the EDS REFMAC calculation (no free set is used in
      this). Currently value is rounded to 2 decimal places. X-ray entry specific,
      obtained in the eds step from REFMAC calculation.
  - - EDS_res_high
    - double precision
    - The data high resolution diffraction limit, in Angstroms, found in the input
      structure factor file. X-ray entry specific, obtained in the EDS step.
  - - EDS_res_low
    - double precision
    - The data low resolution diffraction limit, in Angstroms, found in the input
      structure factor file. X-ray entry specific, obtained in the EDS step.
  - - Wilson_B_aniso
    - text
    - Result of absolute likelihood based Wilson scaling, The anisotropic B value
      of the data is determined using a likelihood based approach. The resulting B
      tensor is reported, the 3 diagonal values are given first, followed by the 3
      off diagonal values. A large spread in (especially the diagonal) values indicates
      anisotropy. X-ray entry specific, calculated by Phenix Xtriage program.
  - - data_anisotropy
    - double precision
    - The ratio (Bmax - Bmin) / Bmean where Bmax, Bmin and Bmean are computed from
      the B-values associated with the principal axes of the anisotropic thermal ellipsoid.
      This ratio is usually less than 0.5; for only 1% of PDB entries it is more than
      1.0 (Read et al., 2011). X-ray entry specific, obtained from the Xtriage program.
  - - trans_NCS_details
    - text
    - A sentence giving the result of Xtriage's analysis on translational NCS. X-ray
      entry specific, obtained from the Xtriage program.
  - - B_factor_type
    - text
    - An indicator if isotropic B factors are partial or full values.
  - - acentric_outliers
    - integer
    - The number of acentric reflections that Xtriage identifies as outliers on the
      basis of Wilson statistics. Note that if pseudo translational symmetry is present,
      a large number of 'outliers' will be present. X-ray entry specific, calculated
      by Phenix Xtriage program.
  - - centric_outliers
    - integer
    - The number of centric reflections that Xtriage identifies as outliers. X-ray
      entry specific, calculated by Phenix Xtriage program.
  - - data_completeness
    - double precision
    - The percent completeness of diffraction data.
  - - number_reflns_R_free
