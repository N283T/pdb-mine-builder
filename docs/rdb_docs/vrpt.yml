      separated list of operators with fractions is givens X-ray entry specific, obtained
      from the Xtriage program.
  - - Fo_Fc_correlation
    - double precision
    - 'Fo,Fc correlation: The difference between the observed structure factors (Fo)
      and the calculated structure factors (Fc) measures the correlation between the
      model and the experimental data. X-ray entry specific, obtained in the eds step
      from REFMAC calculation.'
  - - ordinal
    - integer
    - Uniquely identifies each instance of this category.
  - - density_fitness_version
