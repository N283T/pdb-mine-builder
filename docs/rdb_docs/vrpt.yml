    - 2D graph X-axis title.
  - - x_axis_units
    - text
    - 2D graph X-axis units. (arbitrary if not provided)
  - - y_axis_title
    - text
    - 2D graph Y-axis title.
  - - y_axis_scale
    - text
    - 2D graph Y-axis scale. (linear if not provided)
  - - y_axis_units
