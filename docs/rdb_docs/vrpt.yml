  - - violations_count
    - integer
    - Number of violated restraints.
  - - PDB_model_num
    - text
    - The model number.
  - - ordinal
    - integer
    - Uniquely identifies each model restraint.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_distance_violation_model_summary
  columns:
  - - pdbid
    - text
    - PDBID of an entry. All tables/categories refer back to the PDBID in the brief_summary
