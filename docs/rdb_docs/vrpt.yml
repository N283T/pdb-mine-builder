  - - max_violation
    - double precision
    - The maximum value of violation of a particular restraint in an ensemble.
  - - mean_violation
    - double precision
    - The mean value of the violation of a given restraint in an ensemble.
  - - PDB_model_num
    - integer
    - Model identifier. If the structure does not have multiple models then PDB_model_num
      will be "1".
  - - standard_deviation
    - double precision
    - The standard deviation of the value of the violations of a given restraint in
      an ensemble.
  - - median_violation
    - double precision
    - The median value of the violation of a given restraint in an ensemble
  - - ordinal
    - integer
    - Uniquely identifies each distance violation.
  primary_key:
  - pdbid
  - ordinal
  foreign_keys: []
  desc: ''
- name: pdbx_vrpt_distance_violation_summary
  columns:
  - - pdbid
    - text
