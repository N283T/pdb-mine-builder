# PostgreSQL Safe Settings
# Restore these after bulk load completes
#
# Usage:
#   pixi run db-safe-mode   # Apply these settings

# Enable fsync - ensure data durability
fsync = on

# Enable full page writes - protect against partial page writes
full_page_writes = on

# Enable synchronous commit - wait for WAL write confirmation
synchronous_commit = on

# Enable autovacuum - automatic maintenance
autovacuum = on

# Normal WAL size
max_wal_size = 1GB
