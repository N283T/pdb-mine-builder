# PostgreSQL Bulk Loading Optimizations
# TEMPORARY - restore safe settings after load completes
#
# WARNING: Data loss possible on crash with these settings.
# If crash occurs during bulk load, re-initialize DB with:
#   pixi run db-stop
#   rm -rf $PGDATA
#   pixi run db-init
#
# Usage:
#   pixi run db-bulkload-mode   # Enable these settings
#   pixi run db-safe-mode       # Restore safe settings after load

# Disable fsync - writes go directly to OS cache without waiting for disk
# DANGER: All data since last checkpoint may be lost on crash
fsync = off

# Disable full page writes - no extra WAL writes after checkpoint
# Requires fsync=off to be safe to disable
full_page_writes = off

# Disable synchronous commit - don't wait for WAL write confirmation
synchronous_commit = off

# Disable autovacuum during bulk load - reduces I/O contention
autovacuum = off

# Memory tuning (adjust based on available RAM)
shared_buffers = 24GB
work_mem = 256MB
maintenance_work_mem = 2GB
effective_cache_size = 72GB

# Increase WAL size for bulk operations - reduces checkpoint frequency
max_wal_size = 8GB
