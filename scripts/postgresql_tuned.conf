# PostgreSQL tuned settings for 64GB RAM, 32-core machine
# Append to postgresql.conf or use: include = 'postgresql_tuned.conf'

# =============================================================================
# Memory Settings
# =============================================================================

# Shared memory for caching (25% of RAM)
shared_buffers = 16GB

# Per-operation memory (for sorts, joins, etc.)
work_mem = 64MB

# Memory for maintenance operations (VACUUM, CREATE INDEX)
maintenance_work_mem = 2GB

# Planner's estimate of OS cache available
effective_cache_size = 48GB

# WAL buffers (auto-tuned based on shared_buffers, but set explicitly)
wal_buffers = 64MB

# =============================================================================
# Connections
# =============================================================================

max_connections = 200

# =============================================================================
# Parallelism
# =============================================================================

max_worker_processes = 32
max_parallel_workers = 16
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# =============================================================================
# Storage / I/O (SSD optimized)
# =============================================================================

# Lower for SSD (default 4.0 is for HDD)
random_page_cost = 1.1

# Higher for SSD (default 1 is for HDD)
effective_io_concurrency = 200

# =============================================================================
# WAL / Checkpoint
# =============================================================================

# Spread checkpoint I/O over time
checkpoint_completion_target = 0.9

# Larger WAL segments for bulk loading
wal_level = minimal
max_wal_senders = 0

# =============================================================================
# Bulk Loading Optimizations
# =============================================================================

# Disable fsync during bulk load (DANGER: data loss on crash)
# Uncomment only for initial bulk loading, then re-enable
# fsync = off
# full_page_writes = off

# Autovacuum can slow down bulk loading
# autovacuum = off
