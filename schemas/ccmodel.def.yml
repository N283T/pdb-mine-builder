config:
  primaryKey: model_id
  schema: ccmodel
tables:
  - name: brief_summary
    columns:
      - - model_id
        - text
        - null
      - - docid
        - bigint
        - null
      - - pdbx_initial_date
        - date
        - null
      - - pdbx_modified_date
        - date
        - null
      - - update_date
        - timestamp without time zone
        - null
      - - comp_id
        - text
        - null
      - - csd_id
        - text
        - null
      - - keywords
        - text[]
        - null
    primary_key:
      - model_id
    foreign_keys: []
    keywords: []
    unique_keys: []
  - name: pdbx_chem_comp_model
    columns:
      - - model_id
        - text
      - - id
        - text
      - - comp_id
        - text
    primary_key:
      - model_id
      - id
    foreign_keys:
      - - - model_id
        - brief_summary
        - - model_id
    unique_keys:
      - &ref_0
        - model_id
    keywords: []
  - name: pdbx_chem_comp_model_atom
    columns:
      - - model_id
        - text
      - - atom_id
        - text
      - - ordinal_id
        - integer
      - - charge
        - integer
      - - model_Cartn_x
        - double precision
      - - model_Cartn_y
        - double precision
      - - model_Cartn_z
        - double precision
      - - type_symbol
        - text
    primary_key:
      - model_id
      - atom_id
    foreign_keys:
      - - - model_id
        - brief_summary
        - - model_id
      - - - model_id
        - pdbx_chem_comp_model
        - *ref_0
    unique_keys: []
    keywords: []
    pkout: true
  - name: pdbx_chem_comp_model_bond
    columns:
      - - model_id
        - text
      - - atom_id_1
        - text
      - - atom_id_2
        - text
      - - value_order
        - text
      - - ordinal_id
        - integer
    primary_key:
      - model_id
      - atom_id_1
      - atom_id_2
    foreign_keys:
      - - - model_id
        - brief_summary
        - - model_id
    unique_keys: []
    keywords: []
    pkout: true
  - name: pdbx_chem_comp_model_feature
    columns:
      - - model_id
        - text
      - - feature_name
        - text
      - - feature_value
        - text
    primary_key:
      - model_id
      - feature_name
    foreign_keys:
      - - - model_id
        - brief_summary
        - - model_id
      - - - model_id
        - pdbx_chem_comp_model
        - - model_id
    unique_keys: []
    keywords:
      - feature_name
      - feature_value
    pkout: true
  - name: pdbx_chem_comp_model_descriptor
    columns:
      - - model_id
        - text
      - - descriptor
        - text
      - - type
        - text
    primary_key:
      - model_id
      - type
    foreign_keys:
      - - - model_id
        - brief_summary
        - - model_id
      - - - model_id
        - pdbx_chem_comp_model
        - - model_id
    unique_keys: []
    keywords:
      - descriptor
    pkout: true
  - name: pdbx_chem_comp_model_audit
    columns:
      - - model_id
        - text
      - - date
        - date
      - - action_type
        - text
    primary_key:
      - model_id
      - date
      - action_type
    foreign_keys:
      - - - model_id
        - brief_summary
        - - model_id
    unique_keys: []
    keywords:
      - details
    pkout: true
  - name: pdbx_chem_comp_model_reference
    columns:
      - - model_id
        - text
      - - db_name
        - text
      - - db_code
        - text
    primary_key:
      - model_id
      - db_name
      - db_code
    foreign_keys:
      - - - model_id
        - brief_summary
        - - model_id
      - - - model_id
        - pdbx_chem_comp_model
        - - model_id
    unique_keys: []
    keywords:
      - db_name
      - db_code
    pkout: true
