[workspace]
authors = ["nagaet"]
channels = ["conda-forge"]
name = "mine2updater"
platforms = ["linux-64"]
version = "0.2.0"

[tasks]
# Development
lint = "ruff check src/mine2"
format = "ruff format src/mine2"
typecheck = "ty check src/mine2"
check = { depends-on = ["lint", "format-check", "typecheck"] }
format-check = "ruff format --check src/mine2"
test = "PYTHONPATH=src pytest tests -v"

# Run
mine2 = "PYTHONPATH=src python -m mine2"

# Database
db-init = "initdb -D $PGDATA"
db-start = "pg_ctl -D $PGDATA -l $PGDATA/logfile start"
db-stop = "pg_ctl -D $PGDATA stop"
db-status = "pg_ctl -D $PGDATA status"

[dependencies]
postgresql = ">=17.0.0,<19"
python = ">=3.12"
rdkit-postgresql = ">=2024.09.0"

[pypi-dependencies]
ccd2rdmol = ">=0.2.0"
gemmi = ">=0.7.0"
typer = ">=0.15.0"
rich = ">=13.0.0"
pydantic = ">=2.0.0"
pydantic-settings = ">=2.0.0"
psycopg = { version = ">=3.2.0", extras = ["binary", "pool"] }
pyyaml = ">=6.0.0"
tqdm = ">=4.66.0"
ruff = ">=0.9.0"
ty = "*"
pytest = ">=8.0.0"

# Default environment variables (override with .env file)
[activation.env]
PGPORT = "5433"
PGHOST = "localhost"
PGDATA = "postgres_data_5433"
PGUSER = "pdbj"
PGDATABASE = "mine2"
