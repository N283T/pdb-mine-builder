[workspace]
authors = ["nagaet"]
channels = ["conda-forge"]
name = "pdb-mine-builder"
platforms = ["linux-64", "osx-arm64"]
version = "0.2.0"

[tasks]
# Development
lint = "ruff check src/pdbminebuilder"
format = "ruff format src/pdbminebuilder"
check = { depends-on = ["lint", "format-check"] }
format-check = "ruff format --check src/pdbminebuilder"
test = "pytest tests -v"

# Run (also available as 'pmb' command in pixi shell)
pmb = "python -m pdbminebuilder"

# Database (local development)
db-init = "initdb -D $PGDATA"
db-start = "pg_ctl -D $PGDATA -l $PGDATA/logfile start"
db-stop = "pg_ctl -D $PGDATA stop"
db-status = "pg_ctl -D $PGDATA status"

# Database performance modes (for bulk loading)
db-bulkload-mode = { cmd = "cat scripts/postgresql_bulkload.conf >> $PGDATA/postgresql.auto.conf && pg_ctl reload -D $PGDATA", description = "Enable bulk load mode (DANGEROUS - no crash safety)" }
db-safe-mode = { cmd = "echo '' > $PGDATA/postgresql.auto.conf && pg_ctl reload -D $PGDATA", description = "Restore safe settings after bulk load" }

# Test Database (Docker)
test-db-up = "docker compose -f docker/docker-compose.test.yml up -d --wait"
test-db-down = "docker compose -f docker/docker-compose.test.yml down -v"
test-db-status = "docker compose -f docker/docker-compose.test.yml ps"

# Database migrations (Alembic)
db-migrate = { cmd = "alembic revision --autogenerate -m", description = "Generate migration (pass message)" }
db-upgrade = { cmd = "alembic upgrade head", description = "Apply all pending migrations" }
db-downgrade = { cmd = "alembic downgrade -1", description = "Rollback last migration" }
db-history = { cmd = "alembic history --verbose", description = "Show migration history" }

# Testing
test-unit = "pytest tests -v -m 'not integration'"
test-integration = { cmd = "pytest tests -v -m integration", depends-on = ["test-db-up"] }

[dependencies]
alembic = ">=1.13.0"
defusedxml = ">=0.7.0"
gemmi = ">=0.7.0"
pydantic = ">=2.0.0"
pydantic-settings = ">=2.0.0"
pytest = ">=8.0.0"
python = ">=3.12"
pyyaml = ">=6.0.0"
rdkit-postgresql = ">=2024.09.0"
rich = ">=13.0.0"
ruff = ">=0.9.0"
sqlalchemy = ">=2.0.0"
typer = ">=0.15.0"

[pypi-dependencies]
pdbminebuilder = { path = ".", editable = true }
ccd2rdmol = ">=0.2.0"
psycopg = { version = ">=3.2.0", extras = ["binary", "pool"] }

# Default environment variables (override with .env file)
[activation.env]
PGPORT = "5433"
PGHOST = "localhost"
PGDATA = "postgres_data_5433"
PGUSER = "pdbj"
PGDATABASE = "pmb"
