rdb:
  # nworkers: auto-detected (use --workers to override)
  constring: "host='127.0.0.1' dbname='mine2_test' user='pdbj' password='test_password' port=15433"

pipelines:
  # pdbj: test data uses CIF fixtures
  pdbj:
    format: cif
    data: ${CWD}/data/mmjson-noatom/
    data-plus: ${CWD}/data/plus/
    data-nextgen-plus: ${CWD}/data/nextgen-plus/
  cc:
    format: cif
    data: ${CWD}/data/cc/
  ccmodel:
    format: cif
    data: ${CWD}/data/ccmodel/
  prd:
    format: cif
    data: ${CWD}/data/prd/
  vrpt:
    data: ${CWD}/data/vrpt-json/*
    data-cif: ${CWD}/data/vrpt/*_validation.cif.gz
  contacts:
    data: ${CWD}/data/contacts/
  sifts:
    data: ${CWD}/data/sifts/
